<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#161620"/>
  <!-- Subtle neon border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="18.5"
        fill="none" stroke="oklch(82% 0.22 145)" stroke-opacity="0.18" stroke-width="2"/>
  <!-- PRs — large, centered, neon green -->
  <text x="50" y="50"
        text-anchor="middle" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace"
        font-size="38" font-weight="900" fill="oklch(82% 0.22 145)">PRs</text>
</svg>
